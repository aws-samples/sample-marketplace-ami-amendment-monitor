AWSTemplateFormatVersion: '2010-09-09'
Description: 'Spoke Account - Forward Events to Hub'

Metadata:
  cfn_nag:
    rules_to_suppress:
      - id: W35
        reason: "Logging bucket is the destination for access logs. It doesn't need its own access logging to avoid circular dependency."

Parameters:
  HubAccountId:
    Type: String
    Description: 'Hub AWS Account ID (12 digits)'
    AllowedPattern: '^\d{12}$'
  
  HubEventBusName:
    Type: String
    Description: 'Hub event bus name (must match exactly, case-sensitive)'
    Default: 'ec2-monitoring-hub-Bus'
  
  HubRegion:
    Type: String
    Description: 'Hub region'
    Default: us-east-1

Conditions:
  IsCrossAccount: !Not [!Equals [!Ref HubAccountId, !Ref 'AWS::AccountId']]

Resources:
  # KMS Key for encryption
  EncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: 'KMS key for spoke account CloudTrail encryption'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: Allow CloudTrail to encrypt logs
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action:
              - 'kms:GenerateDataKey*'
              - 'kms:DecryptDataKey'
            Resource: '*'
            Condition:
              StringLike:
                'kms:EncryptionContext:aws:cloudtrail:arn':
                  - !Sub 'arn:aws:cloudtrail:*:${AWS::AccountId}:trail/*'
          - Sid: Allow CloudTrail to describe key
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: 'kms:DescribeKey'
            Resource: '*'

  EncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub 'alias/${AWS::StackName}-encryption'
      TargetKeyId: !Ref EncryptionKey

  # S3 Bucket for Access Logs
  LoggingBucket:
    Type: AWS::S3::Bucket
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W35
            reason: "This is the logging destination bucket. Enabling access logging on it would create a circular dependency."
      checkov:
        skip:
          - id: CKV_AWS_18
            comment: "This is the logging destination bucket. Cannot enable access logging on itself to avoid circular dependency."
    Properties:
      BucketName: !Sub '${AWS::StackName}-logs-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90

  LoggingBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LoggingBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: S3ServerAccessLogsPolicy
            Effect: Allow
            Principal:
              Service: logging.s3.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${LoggingBucket.Arn}/*'
            Condition:
              StringEquals:
                'aws:SourceAccount': !Ref 'AWS::AccountId'

  # S3 Bucket for CloudTrail
  CloudTrailBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::StackName}-trail-${AWS::AccountId}'
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref LoggingBucket
        LogFilePrefix: cloudtrail-logs/
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 7
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # S3 Bucket Policy
  CloudTrailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudTrailBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt CloudTrailBucket.Arn
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${CloudTrailBucket.Arn}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt CloudTrailBucket.Arn
              - !Sub '${CloudTrailBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  # CloudTrail
  Trail:
    Type: AWS::CloudTrail::Trail
    DependsOn: CloudTrailBucketPolicy
    Properties:
      TrailName: !Sub '${AWS::StackName}-Trail'
      S3BucketName: !Ref CloudTrailBucket
      IsLogging: true
      IsMultiRegionTrail: true
      IncludeGlobalServiceEvents: true
      EnableLogFileValidation: true
      KMSKeyId: !Ref EncryptionKey
      EventSelectors:
        - ReadWriteType: WriteOnly
          IncludeManagementEvents: true

  # EventBridge Role
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PutEvents
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: !Sub 'arn:aws:events:${HubRegion}:${HubAccountId}:event-bus/${HubEventBusName}'

  # Forward State Changes to hub custom bus
  StateChangeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${AWS::StackName}-StateChange'
      EventPattern:
        source: [aws.ec2]
        detail-type: [EC2 Instance State-change Notification]
        detail:
          state: [stopping, stopped]
      State: ENABLED
      Targets:
        - Arn: !Sub 'arn:aws:events:${HubRegion}:${HubAccountId}:event-bus/${HubEventBusName}'
          Id: HubBus
          RoleArn: !GetAtt EventBridgeRole.Arn

  # Forward Modify Events to hub custom bus (cross-account) or same account
  ModifyRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${AWS::StackName}-Modify'
      EventPattern:
        source: [aws.ec2]
        detail-type: [AWS API Call via CloudTrail]
        detail:
          eventName: [ModifyInstanceAttribute]
      State: ENABLED
      Targets:
        - Arn: !Sub 'arn:aws:events:${HubRegion}:${HubAccountId}:event-bus/${HubEventBusName}'
          Id: HubBus
          RoleArn: !GetAtt EventBridgeRole.Arn

Outputs:
  TrailName:
    Value: !Ref Trail
  StateChangeRuleArn:
    Value: !GetAtt StateChangeRule.Arn
  ModifyRuleArn:
    Value: !GetAtt ModifyRule.Arn
  DeploymentType:
    Value: !If [IsCrossAccount, 'Cross-Account', 'Same-Account']
